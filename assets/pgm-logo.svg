<svg viewBox="0 0 260 56" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Posture Guy Mike">
  <!-- ── Spine Icon ── -->
  <!-- Head circle -->
  <circle cx="26" cy="10" r="7" fill="currentColor"/>
  <!-- Spine rod (straight = aligned posture) -->
  <rect x="24" y="19" width="4" height="26" rx="2" fill="currentColor"/>
  <!-- Shoulder line (horizontal alignment marker) -->
  <rect x="12" y="23" width="28" height="3" rx="1.5" fill="#1d4ed8"/>
  <!-- Mid-back line -->
  <rect x="16" y="31" width="20" height="2.5" rx="1.25" fill="#3b82f6" opacity="0.7"/>
  <!-- Hip line -->
  <rect x="14" y="38" width="24" height="3" rx="1.5" fill="#1d4ed8"/>

  <!-- ── Wordmark ── -->
  <!-- "POSTURE GUY" top line -->
  <text
    x="52"
    y="26"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="17"
    letter-spacing="-0.4"
    fill="currentColor"
  >POSTURE GUY</text>
  <!-- "MIKE" bottom line in blue -->
  <text
    x="52"
    y="47"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="900"
    font-size="22"
    letter-spacing="-0.8"
    fill="#1d4ed8"
  >MIKE</text>
</svg>
