<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" width="224" height="45" role="img" aria-label="Posture Guy Mike">
  <title>Posture Guy Mike</title>

  <!-- PG Circle mark -->
  <circle cx="28" cy="28" r="28" fill="#3b9cd8"/>
  <text x="4" y="42" font-family="Impact,'Arial Narrow',Arial,sans-serif" font-size="38" fill="#111111">P</text>
  <text x="23" y="42" font-family="Impact,'Arial Narrow',Arial,sans-serif" font-size="38" fill="#ffffff">G</text>

  <!-- Divider -->
  <line x1="68" y1="8" x2="68" y2="48" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Wordmark: "POSTURE GUY" label -->
  <text
    x="80" y="24"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="13" font-weight="700"
    fill="rgba(255,255,255,0.75)"
    letter-spacing="2"
  >POSTURE GUY</text>

  <!-- Wordmark: "MIKE" hero -->
  <text
    x="79" y="50"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="28" font-weight="900"
    fill="#ffffff"
    letter-spacing="-0.5"
  >MIKE</text>

  <!-- Blue accent underline -->
  <rect x="79" y="53" width="70" height="2.5" rx="1.25" fill="#3b9cd8"/>
</svg>
